<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>終極實戰版 - 選擇權價差與 T+0 盤中風控模擬器</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #4fc3f7; 
            --border-color: #333;
            --danger-color: #f44336;
            --warning-color: #ff9800;
            --current-color: #ffeb3b;
            --t0-color: #ff4081; /* T+0 曲線顏色 */
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { font-size: 24px; margin-bottom: 20px; color: #fff; }
        .container { width: 100%; max-width: 1400px; display: flex; flex-direction: column; gap: 20px; }
        .chart-container {
            background-color: var(--panel-bg);
            padding: 20px; border-radius: 8px; border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative; height: 600px; width: 100%;
        }
        .controls-wrapper {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px;
        }
        .control-panel {
            background-color: var(--panel-bg); padding: 15px; border-radius: 8px;
            border: 1px solid var(--border-color); box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .risk-panel { grid-column: 1 / -1; border-left: 5px solid var(--warning-color); position: relative; }
        .bs-panel { grid-column: 1 / -1; border-left: 5px solid var(--t0-color); background: rgba(255, 64, 129, 0.05); }
        .panel-put { border-top: 3px solid #e91e63; }
        .panel-call { border-top: 3px solid #03a9f4; }
        .panel-fut { border-top: 3px solid #8bc34a; }
        
        .control-panel h3 {
            margin-top: 0; margin-bottom: 12px; padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color); color: var(--text-color); font-size: 16px;
        }
        .risk-panel h3 { color: var(--warning-color); font-size: 18px; display: inline-block; }
        .bs-panel h3 { color: var(--t0-color); font-size: 18px; }
        
        .reset-btn {
            position: absolute; right: 20px; top: 15px;
            background-color: var(--danger-color); color: #fff;
            border: none; padding: 8px 16px; border-radius: 4px;
            font-size: 14px; font-weight: bold; cursor: pointer;
            transition: background-color 0.3s;
        }
        .reset-btn:hover { background-color: #d32f2f; }

        .input-group { margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .risk-group { display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
        .risk-group .input-group { flex: 1; min-width: 250px; margin-bottom: 0; }
        .input-group label { flex: 1; font-size: 13px; }
        .input-group select, .input-group input {
            flex: 1.2; padding: 5px; background-color: #2c2c2c; color: #fff;
            border: 1px solid #444; border-radius: 4px; font-size: 13px;
        }
        .input-group select:focus, .input-group input:focus { outline: none; border-color: var(--accent-color); }
        .highlight-text { color: var(--current-color); font-weight: bold; }
        .atr-text { color: var(--warning-color); font-weight: bold; }
        .info-box {
            flex-basis: 100%; margin-top: 15px; padding: 12px; border-radius: 4px;
            display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
            background: rgba(255, 152, 0, 0.1); border-left: 4px solid var(--warning-color);
        }
        .info-box span.title { font-weight: bold; font-size: 14px; margin-right: 10px; color: var(--warning-color);}
        .info-box span.val { color: #fff; font-size: 14px; font-weight: normal; letter-spacing: 0.5px; line-height: 1.5; }
    </style>
</head>
<body>

    <h1>🚀 終極 T+0 盤中預估與價差風控模擬器</h1>
    
    <div class="container">
        <div class="chart-container">
            <canvas id="payoffChart"></canvas>
        </div>

        <div class="controls-wrapper">
            <div class="control-panel risk-panel">
                <h3>📏 全局設定與 ATR 停損雷達</h3>
                <button class="reset-btn" onclick="resetAllFields()">🧹 全部歸零</button>
                <div class="risk-group">
                    <div class="input-group">
                        <label class="highlight-text">📍 策略進場點數：</label>
                        <input type="number" id="current-price" value="0" step="1" oninput="updateChart()">
                    </div>
                    <div class="input-group">
                        <label class="atr-text">📏 日均震幅 (ATR)：</label>
                        <input type="number" id="atr-points" value="0" step="1" oninput="updateChart()">
                    </div>
                    <div class="input-group">
                        <label class="atr-text">✖️ 停損倍數：</label>
                        <input type="number" id="atr-mult" value="1.0" step="0.1" oninput="updateChart()">
                    </div>
                </div>
                <div class="info-box">
                    <span class="title">🛑 停損邊界評估：</span>
                    <span class="val" id="atr-risk-eval">請輸入進場點數與 ATR 值</span>
                </div>
            </div>

            <div class="control-panel bs-panel">
                <h3>⏳ Black-Scholes 盤中模擬 (T+0 曲線參數)</h3>
                <div class="risk-group">
                    <div class="input-group">
                        <label>離結算天數 (DTE)：</label>
                        <input type="number" id="bs-dte" value="5" step="1" min="0" oninput="updateChart()">
                    </div>
                    <div class="input-group">
                        <label>隱含波動率 (IV %)：</label>
                        <input type="number" id="bs-iv" value="20" step="1" min="1" oninput="updateChart()">
                    </div>
                    <div class="input-group">
                        <label>無風險利率 (%)：</label>
                        <input type="number" id="bs-rate" value="2" step="0.1" oninput="updateChart()">
                    </div>
                </div>
            </div>
            
            <div class="control-panel panel-fut">
                <h3>📈 期貨部位 (Futures)</h3>
                <div class="input-group"><label>合約類型：</label><select id="fut-type" onchange="updateChart()"><option value="none" selected>無 (None)</option><option value="mini">小台指 (50元/點)</option><option value="micro">微台指 (10元/點)</option></select></div>
                <div class="input-group"><label>方向設定：</label><select id="fut-dir" onchange="updateChart()"><option value="long">做多 (Long)</option><option value="short" selected>放空 (Short)</option></select></div>
                <div class="input-group"><label>進場點數：</label><input type="number" id="fut-entry" value="0" step="1" oninput="updateChart()"></div>
                <div class="input-group"><label>口數 (Qty)：</label><input type="number" id="fut-qty" value="0" min="0" step="1" oninput="updateChart()"></div>
            </div>

            <div class="control-panel panel-call">
                <h3 style="color:#03a9f4;">🔼 買權部位 1 (Call 1)</h3>
                <div class="input-group"><label>方向：</label><select id="call1-dir" onchange="updateChart()"><option value="none" selected>無 (None)</option><option value="long">買進 (Buy CALL)</option><option value="short">賣出 (Sell CALL)</option></select></div>
                <div class="input-group"><label>履約價：</label><input type="number" id="call1-strike" value="0" step="100" oninput="updateChart()"></div>
                <div class="input-group"><label>權利金：</label><input type="number" id="call1-prem" value="0" step="1" oninput="updateChart()"></div>
                <div class="input-group"><label>口數：</label><input type="number" id="call1-qty" value="0" min="0" step="1" oninput="updateChart()"></div>
            </div>

            <div class="control-panel panel-call">
                <h3 style="color:#03a9f4;">🔼 買權部位 2 (Call 2)</h3>
                <div class="input-group"><label>方向：</label><select id="call2-dir" onchange="updateChart()"><option value="none" selected>無 (None)</option><option value="long">買進 (Buy CALL)</option><option value="short">賣出 (Sell CALL)</option></select></div>
                <div class="input-group"><label>履約價：</label><input type="number" id="call2-strike" value="0" step="100" oninput="updateChart()"></div>
                <div class="input-group"><label>權利金：</label><input type="number" id="call2-prem" value="0" step="1" oninput="updateChart()"></div>
                <div class="input-group"><label>口數：</label><input type="number" id="call2-qty" value="0" min="0" step="1" oninput="updateChart()"></div>
            </div>

            <div class="control-panel panel-put">
                <h3 style="color:#e91e63;">🔽 賣權部位 1 (Put 1)</h3>
                <div class="input-group"><label>方向：</label><select id="put1-dir" onchange="updateChart()"><option value="none" selected>無 (None)</option><option value="long">買進 (Buy PUT)</option><option value="short">賣出 (Sell PUT)</option></select></div>
                <div class="input-group"><label>履約價：</label><input type="number" id="put1-strike" value="0" step="100" oninput="updateChart()"></div>
                <div class="input-group"><label>權利金：</label><input type="number" id="put1-prem" value="0" step="1" oninput="updateChart()"></div>
                <div class="input-group"><label>口數：</label><input type="number" id="put1-qty" value="0" min="0" step="1" oninput="updateChart()"></div>
            </div>

            <div class="control-panel panel-put">
                <h3 style="color:#e91e63;">🔽 賣權部位 2 (Put 2)</h3>
                <div class="input-group"><label>方向：</label><select id="put2-dir" onchange="updateChart()"><option value="none" selected>無 (None)</option><option value="long">買進 (Buy PUT)</option><option value="short">賣出 (Sell PUT)</option></select></div>
                <div class="input-group"><label>履約價：</label><input type="number" id="put2-strike" value="0" step="100" oninput="updateChart()"></div>
                <div class="input-group"><label>權利金：</label><input type="number" id="put2-prem" value="0" step="1" oninput="updateChart()"></div>
                <div class="input-group"><label>口數：</label><input type="number" id="put2-qty" value="0" min="0" step="1" oninput="updateChart()"></div>
            </div>

        </div>
    </div>

    <script>
        let myChart = null;
        const optMultiplier = 50; 

        // ==========================================
        // 數學引擎：常態分配與 Black-Scholes 定價模型
        // ==========================================
        function normalCDF(x) {
            let t = 1 / (1 + 0.2316419 * Math.abs(x));
            let d = 0.3989423 * Math.exp(-x * x / 2);
            let prob = d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
            if (x > 0) prob = 1 - prob;
            return prob;
        }

        function bsPrice(S, K, t, r, v, isCall) {
            // 如果已結算 (天數<=0) 或數值異常，返回內含價值
            if (t <= 0 || S <= 0) return isCall ? Math.max(0, S - K) : Math.max(0, K - S);
            let d1 = (Math.log(S / K) + (r + v * v / 2) * t) / (v * Math.sqrt(t));
            let d2 = d1 - v * Math.sqrt(t);
            if (isCall) {
                return S * normalCDF(d1) - K * Math.exp(-r * t) * normalCDF(d2);
            } else {
                return K * Math.exp(-r * t) * normalCDF(-d2) - S * normalCDF(-d1);
            }
        }

        function resetAllFields() {
            document.getElementById('current-price').value = 0;
            document.getElementById('atr-points').value = 0;
            document.getElementById('atr-mult').value = 1.0; 
            document.getElementById('bs-dte').value = 5;
            document.getElementById('bs-iv').value = 20;
            document.getElementById('bs-rate').value = 2;
            ['fut','call1','call2','put1','put2'].forEach(p => {
                if(p === 'fut') { document.getElementById(p+'-type').value = 'none'; document.getElementById(p+'-dir').value = 'short'; }
                else { document.getElementById(p+'-dir').value = 'none'; document.getElementById(p+'-strike').value = 0; }
                document.getElementById(p+'-entry') ? document.getElementById(p+'-entry').value = 0 : null;
                document.getElementById(p+'-prem') ? document.getElementById(p+'-prem').value = 0 : null;
                document.getElementById(p+'-qty').value = 0;
            });
            updateChart();
        }

        // 結算日選擇權損益 (到期 Payoff)
        function getOptExpPnL(dir, strike, prem, qty, ST, isCall) {
            if (dir === 'none' || qty <= 0) return 0;
            let payoff = isCall ? Math.max(0, ST - strike) : Math.max(0, strike - ST);
            let pts = (dir === 'long') ? (payoff - prem) : (prem - payoff);
            return pts * optMultiplier * qty;
        }

        // 盤中 T+0 選擇權損益 (Black-Scholes 價格)
        function getOptT0PnL(dir, strike, prem, qty, ST, isCall, t, r, v) {
            if (dir === 'none' || qty <= 0) return 0;
            let currentTheoryPrice = bsPrice(ST, strike, t, r, v, isCall);
            let pts = (dir === 'long') ? (currentTheoryPrice - prem) : (prem - currentTheoryPrice);
            return pts * optMultiplier * qty;
        }

        // 核心計算：整合期貨與選擇權
        function calculateTotalPnL(ST, isT0) {
            let totalPnL = 0;
            
            // 期貨 (盤中與結算視為一致)
            const fType = document.getElementById('fut-type').value;
            const fDir = document.getElementById('fut-dir').value;
            const fEntry = parseFloat(document.getElementById('fut-entry').value) || 0;
            const fQty = parseFloat(document.getElementById('fut-qty').value) || 0;
            if (fType !== 'none' && fQty > 0) {
                let m = (fType === 'mini') ? 50 : 10;
                let pts = (fDir === 'long') ? (ST - fEntry) : (fEntry - ST);
                totalPnL += pts * m * fQty;
            }

            if (!isT0) {
                totalPnL += getOptExpPnL(document.getElementById('call1-dir').value, parseFloat(document.getElementById('call1-strike').value)||0, parseFloat(document.getElementById('call1-prem').value)||0, parseFloat(document.getElementById('call1-qty').value)||0, ST, true);
                totalPnL += getOptExpPnL(document.getElementById('call2-dir').value, parseFloat(document.getElementById('call2-strike').value)||0, parseFloat(document.getElementById('call2-prem').value)||0, parseFloat(document.getElementById('call2-qty').value)||0, ST, true);
                totalPnL += getOptExpPnL(document.getElementById('put1-dir').value, parseFloat(document.getElementById('put1-strike').value)||0, parseFloat(document.getElementById('put1-prem').value)||0, parseFloat(document.getElementById('put1-qty').value)||0, ST, false);
                totalPnL += getOptExpPnL(document.getElementById('put2-dir').value, parseFloat(document.getElementById('put2-strike').value)||0, parseFloat(document.getElementById('put2-prem').value)||0, parseFloat(document.getElementById('put2-qty').value)||0, ST, false);
            } else {
                // T+0 理論參數
                let dte = parseFloat(document.getElementById('bs-dte').value) || 0;
                let t = dte / 365.0;
                let r = (parseFloat(document.getElementById('bs-rate').value) || 0) / 100.0;
                let v = (parseFloat(document.getElementById('bs-iv').value) || 20) / 100.0;
                
                totalPnL += getOptT0PnL(document.getElementById('call1-dir').value, parseFloat(document.getElementById('call1-strike').value)||0, parseFloat(document.getElementById('call1-prem').value)||0, parseFloat(document.getElementById('call1-qty').value)||0, ST, true, t, r, v);
                totalPnL += getOptT0PnL(document.getElementById('call2-dir').value, parseFloat(document.getElementById('call2-strike').value)||0, parseFloat(document.getElementById('call2-prem').value)||0, parseFloat(document.getElementById('call2-qty').value)||0, ST, true, t, r, v);
                totalPnL += getOptT0PnL(document.getElementById('put1-dir').value, parseFloat(document.getElementById('put1-strike').value)||0, parseFloat(document.getElementById('put1-prem').value)||0, parseFloat(document.getElementById('put1-qty').value)||0, ST, false, t, r, v);
                totalPnL += getOptT0PnL(document.getElementById('put2-dir').value, parseFloat(document.getElementById('put2-strike').value)||0, parseFloat(document.getElementById('put2-prem').value)||0, parseFloat(document.getElementById('put2-qty').value)||0, ST, false, t, r, v);
            }

            return totalPnL;
        }

        const tacticalLinesPlugin = {
            id: 'tacticalLines',
            afterDraw: (chart) => {
                const curPrice = parseFloat(document.getElementById('current-price').value);
                const atrPts = parseFloat(document.getElementById('atr-points').value) || 0;
                const atrMult = parseFloat(document.getElementById('atr-mult').value) || 0;
                
                if (!curPrice || curPrice === 0) return; 
                
                const xAxis = chart.scales.x;
                const yAxis = chart.scales.y;
                const ctx = chart.ctx;

                function drawVLine(xVal, color, labelText, yOffset) {
                    if (xVal >= xAxis.min && xVal <= xAxis.max) {
                        const x = xAxis.getPixelForValue(xVal);
                        ctx.save(); ctx.beginPath(); ctx.setLineDash([5, 5]);
                        ctx.moveTo(x, yAxis.top); ctx.lineTo(x, yAxis.bottom);
                        ctx.lineWidth = 2; ctx.strokeStyle = color; ctx.stroke();
                        ctx.fillStyle = color; const textW = ctx.measureText(labelText).width + 16;
                        ctx.fillRect(x - textW/2, yAxis.top + yOffset - 18, textW, 22);
                        ctx.fillStyle = (color === '#ffeb3b') ? '#000' : '#fff';
                        ctx.textAlign = 'center'; ctx.font = 'bold 13px Arial';
                        ctx.fillText(labelText, x, yAxis.top + yOffset - 3); ctx.restore();
                    }
                }

                drawVLine(curPrice, '#ffeb3b', '📍 策略進場點', 0);
                if (atrPts > 0 && atrMult > 0) {
                    const lb = curPrice - (atrPts * atrMult); const ub = curPrice + (atrPts * atrMult);
                    drawVLine(lb, '#ff9800', `🛑 下檔停損點`, 28); drawVLine(ub, '#ff9800', `🛑 上檔停損/停利`, 28);
                }
            }
        };

        function formatNTD(val) { return (val >= 0 ? '+' : '') + val.toLocaleString() + ' 元'; }

        function updateChart() {
            const cur = parseFloat(document.getElementById('current-price').value) || 0;
            const atr = parseFloat(document.getElementById('atr-points').value) || 0;
            const mult = parseFloat(document.getElementById('atr-mult').value) || 0;

            const hasPos = (document.getElementById('fut-type').value !== 'none' || 
                            document.getElementById('call1-dir').value !== 'none' || document.getElementById('call2-dir').value !== 'none' ||
                            document.getElementById('put1-dir').value !== 'none' || document.getElementById('put2-dir').value !== 'none');
            
            // 更新風險評估文字 (同時顯示結算與T+0)
            if (!hasPos) {
                document.getElementById('atr-risk-eval').innerHTML = "請先建立部位";
            } else if (cur > 0 && atr > 0 && mult > 0) {
                const lb = cur - (atr * mult); const ub = cur + (atr * mult);
                
                const lPnlExp = calculateTotalPnL(lb, false); 
                const uPnlExp = calculateTotalPnL(ub, false);
                const lPnlT0 = calculateTotalPnL(lb, true); 
                const uPnlT0 = calculateTotalPnL(ub, true);

                document.getElementById('atr-risk-eval').innerHTML = 
                    `<div style="margin-bottom: 5px;"><strong>[📉 跌至下檔停損 ${lb.toLocaleString()}]</strong> ➡️ 結算若在此: <span style="color:${lPnlExp>=0?'#4caf50':'#f44336'};">${formatNTD(lPnlExp)}</span> ｜ <span style="color:var(--t0-color);">盤中立刻砍倉 (T+0): ${formatNTD(lPnlT0)}</span></div>` +
                    `<div><strong>[📈 漲至上檔停損 ${ub.toLocaleString()}]</strong> ➡️ 結算若在此: <span style="color:${uPnlExp>=0?'#4caf50':'#f44336'};">${formatNTD(uPnlExp)}</span> ｜ <span style="color:var(--t0-color);">盤中立刻砍倉 (T+0): ${formatNTD(uPnlT0)}</span></div>`;
            } else {
                document.getElementById('atr-risk-eval').innerHTML = "請輸入進場點數與 ATR 值";
            }

            // 抓取 X 軸範圍
            let act = [];
            if (cur > 0) { act.push(cur); if (atr > 0 && mult > 0) { act.push(cur - atr*mult); act.push(cur + atr*mult); } }
            if (document.getElementById('fut-type').value !== 'none') act.push(parseFloat(document.getElementById('fut-entry').value) || 0);
            if (document.getElementById('call1-dir').value !== 'none') act.push(parseFloat(document.getElementById('call1-strike').value) || 0);
            if (document.getElementById('call2-dir').value !== 'none') act.push(parseFloat(document.getElementById('call2-strike').value) || 0);
            if (document.getElementById('put1-dir').value !== 'none') act.push(parseFloat(document.getElementById('put1-strike').value) || 0);
            if (document.getElementById('put2-dir').value !== 'none') act.push(parseFloat(document.getElementById('put2-strike').value) || 0);
            
            act = act.filter(p => p > 0);
            let minP = 0, maxP = 10000;
            if (act.length > 0) {
                minP = Math.max(0, Math.min(...act) - 2000); maxP = Math.max(...act) + 2000;
            }

            const lbls = [], dPnlExp = [], dPnlT0 = [], dZero = [];
            for (let i = minP; i <= maxP; i += 50) { 
                lbls.push(i); 
                dPnlExp.push(calculateTotalPnL(i, false)); 
                dPnlT0.push(calculateTotalPnL(i, true)); 
                dZero.push(0); 
            }

            if (myChart) myChart.destroy();
            const ctx = document.getElementById('payoffChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: lbls,
                    datasets: [
                        { label: '結算日損益 (Expiration)', data: dPnlExp, borderColor: '#4fc3f7', backgroundColor: 'rgba(79, 195, 247, 0.1)', borderWidth: 2, fill: true, pointRadius: 0, pointHitRadius: 10 },
                        { label: '盤中理論損益 (T+0)', data: dPnlT0, borderColor: '#ff4081', borderDash: [5, 5], backgroundColor: 'transparent', borderWidth: 2, fill: false, pointRadius: 0, pointHitRadius: 10 },
                        { label: '損益兩平線', data: dZero, borderColor: '#f44336', borderWidth: 1, borderDash: [2, 4], fill: false, pointRadius: 0, pointHitRadius: 0 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, layout: { padding: { top: 35, right: 30, left: 30 } },
                    interaction: { mode: 'index', intersect: false },
                    plugins: { tooltip: { callbacks: { title: ctx => '大盤點數: ' + ctx[0].label + ' 點', label: ctx => ctx.datasetIndex===2?null: ctx.dataset.label + ': ' + formatNTD(ctx.raw) } }, legend: { labels: { color: '#e0e0e0' } } },
                    scales: {
                        x: { grid: { color: '#333' }, ticks: { color: '#aaa', maxTicksLimit: 15 }, title: { display: true, text: '大盤點數', color: '#fff' } },
                        y: { grid: { color: '#333' }, ticks: { color: '#aaa', callback: v => v.toLocaleString() + ' 元' }, title: { display: true, text: '總損益 (NTD)', color: '#fff' } }
                    }
                },
                plugins: [tacticalLinesPlugin] 
            });
        }
        window.onload = updateChart;
    </script>
</body>
</html>
